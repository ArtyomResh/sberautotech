version: '3'
services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - BACKEND_API_URL=http://sberautotech-backend.dev.fe.sbauto.tech
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:8080"
